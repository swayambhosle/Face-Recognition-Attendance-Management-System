{% extends "base.html" %}

{% block content %}
<h2>Students</h2>

<h3>Add New Student</h3>
<form method="post">
  <label>Roll No:</label>
  <input type="text" name="roll_no" required>

  <label>Name:</label>
  <input type="text" name="name" required>

  <label>Class:</label>
  <input type="text" name="class_name" placeholder="e.g. TE AI A" required>

  <button type="submit">Add Student</button>
</form>

<hr>

<h3>Student List</h3>
<table border="1" cellpadding="5" cellspacing="0">
  <tr>
    <th>ID</th>
    <th>Roll No</th>
    <th>Name</th>
    <th>Class</th>
    <th>Face</th>
  </tr>
  {% for s in students %}
  <tr>
    <td>{{ s.id }}</td>
    <td>{{ s.roll_no }}</td>
    <td>{{ s.name }}</td>
    <td>{{ s.class_name }}</td>
    <td>
      <a href="{{ url_for('register_face', student_id=s.id) }}">Register Face</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
